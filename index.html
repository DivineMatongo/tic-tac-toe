        <link rel="stylesheet" href="styles.css">
        <script defer src="script.js"></script>
        <title>Tic Tac Toe</title>
    </head>
    <body>
        <div class="header">
            <h1>Player 1: X</h1>
            <button>Reset</button>
        </div>

        <div class="game-area">
            <div id="00" class="left top">𐄂</div>
            <div id="01" class="top">𐄂</div>
            <div id="02" class="right top">𐄂</div>
            <div id="10" class="left">𐄂</div>
            <div id="11">𐄂</div>
            <div id="12" class="right">𐄂</div>
            <div id="20" class="left bottom">𐄂</div>
            <div id="21" class="bottom">𐄂</div>
            <div id="22" class="right bottom">𐄂</div>
        </div>

        <div class="footer">
            <p>
                © 2026 by
