<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <script defer src="script.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <title>Tic Tac Toe</title>
    </head>
    <body>
        <div class="header">
            <h1>TicTacToe</h1>
            <label>Player 1: ×</label>
            <div>
                <div class="button-container">
                    <button class="game-button">Reset</button>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div id="00" class="game-square left top"></div>
            <div id="01" class="game-square top"></div>
            <div id="02" class="game-square right top"></div>
            <div id="10" class="game-square left"></div>
            <div id="11" class="game-square"></div>
            <div id="12" class="game-square right"></div>
            <div id="20" class="game-square left bottom"></div>
            <div id="21" class="game-square bottom"></div>
            <div id="22" class="game-square right bottom"></div>
        </div>

        <div class="footer">
            <p>
                © 2026 by
                <a href="https://github.com/DivineMatongo" target="_blank" referrer="no-referrer">
                    Divine Matongo
                </a>
                <br> Hand-coded in CSS & JS as part of The Odin Project course
            </p>
        </div>
    </body>
</html>
